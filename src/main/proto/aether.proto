syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.ocp.aether.grpc";

message MissionPacket {
  string monitor_id = 1;
  string url = 2;
  int32 timeout_ms = 3;
}

message PulseResult {
  string monitor_id = 1;
  int32 status_code = 2;
  int64 latency_ms = 3;
  string region = 4;
}

service AetherNeuralLink {
  rpc StreamNeuralLink(stream PulseResult) returns (stream MissionPacket);
}